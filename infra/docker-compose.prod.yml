# OUSSOURI 生产编排（OVH 单节点，决策 D5）
# 使用: docker compose -f infra/docker-compose.prod.yml --env-file .env.production up -d
name: oussouri
services:
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/oussouri.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-etc:/etc/letsencrypt:ro
    depends_on:
      - web
      - api

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    entrypoint: sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'

  web:
    image: ghcr.io/ayacloud-kewen/oussouri-web:latest
    restart: always
    environment:
      API_URL: http://api:3001
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy

  api:
    image: ghcr.io/ayacloud-kewen/oussouri-api:latest
    restart: always
    env_file:
      - ../.env.production
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:-oussouri}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 10
    # 生产不对外暴露端口；备份容器走内网

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
  certbot-www:
  certbot-etc:

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @oussouri/api prisma:generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=core
      - name: Build shared package
        run: pnpm --filter @oussouri/shared build
      - name: Typecheck
        run: pnpm --filter @oussouri/api typecheck && pnpm --filter @oussouri/web typecheck
      - name: Unit tests
        run: pnpm --filter @oussouri/api test
      - name: Build
        run: pnpm --filter @oussouri/api build && pnpm --filter @oussouri/web build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=core
